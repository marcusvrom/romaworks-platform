version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: romaworks_nginx
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - romaworks_network

  api:
    image: node:22-alpine
    container_name: romaworks_api
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - romaworks_network

  web:
    image: node:22-alpine
    container_name: romaworks_web
    working_dir: /app
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    env_file:
      - .env
    ports:
      - "4200:4200"
    restart: unless-stopped
    networks:
      - romaworks_network

  worker:
    image: node:22-alpine
    container_name: romaworks_worker
    working_dir: /app
    command: sh -c "npm install && npm run start:worker"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - romaworks_network

  postgres:
    image: postgres:16-alpine
    container_name: romaworks_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-romaworks}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - romaworks_network

  redis:
    image: redis:7-alpine
    container_name: romaworks_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - romaworks_network

volumes:
  postgres_data:
  redis_data:

networks:
  romaworks_network:
    driver: bridge